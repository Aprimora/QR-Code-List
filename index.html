<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aprimora Studio de Pilates</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #ffffff; color: #111; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px; text-align: center; }
    h1 { font-size: 24px; margin: 20px 0; }
    .links { display: grid; gap: 12px; margin-top: 20px; }
    a.btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      text-decoration: none; text-align: center;
      padding: 14px 16px; border-radius: 10px;
      border: 1px solid #ddd; background: #f9f9f9; color: #111; font-weight: 600;
      transition: background 0.2s;
    }
    a.btn:hover { background: #f1f1f1; }
    footer { margin-top: 28px; font-size: 12px; color: #666; }
    img.logo { max-width: 220px; height: auto; margin-bottom: 16px; }
    img.icon { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="LogoAprimora.png" alt="Aprimora Studio de Pilates">

    <h1>Links</h1>

    <div class="links">
      <a class="btn" href="https://www.instagram.com/aprimorastudiodepilates" target="_blank" rel="noopener">
        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
        Instagram
      </a>

      <a class="btn" href="https://www.facebook.com/studioaprimora" target="_blank" rel="noopener">
        <img class="icon" src="LogoFacebook.png" alt="Facebook">
        Facebook
      </a>

      <a id="whatsapp-link" class="btn" href="javascript:void(0)" rel="noopener">
        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        WhatsApp
      </a>

      <a class="btn" href="https://www.studioaprimora.com.br/" target="_blank" rel="noopener">
        <img class="icon" src="website-icon-8.png" alt="Site">
        Site
      </a>
    </div>

    <footer>© Aprimora Studio de Pilates</footer>
  </div>

  <script>
    const SUPABASE_URL = "https://irvksqjmvgwztcshqpye.supabase.co";
    const SUPABASE_KEY = "sb_publishable_7IVjNduroIDoEQcmbGVCbg_1qe0CU7F";

    const params = new URLSearchParams(window.location.search);
    const origem = params.get("origem") || "QR-Code";

    const mensagem = `Olá! Vim pelo ${origem}.`;
    const whatsappUrl = `https://wa.me/5551996922828?text=${encodeURIComponent(mensagem)}`;

    const btn = document.getElementById("whatsapp-link");

    btn.addEventListener("click", async function (e) {
      e.preventDefault();

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/lead_events`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Prefer": "return=representation"
          },
          body: JSON.stringify([
            {
              origem: origem,
              event_type: "click_whatsapp",
              user_agent: navigator.userAgent
            }
          ])
        });

        const result = await response.text();
        console.log("Supabase status:", response.status);
        console.log("Supabase resposta:", result);
      } catch (err) {
        console.error("Erro ao registrar evento:", err);
      }

      window.open(whatsappUrl, "_blank");
    });
  </script>
</body>
</html>
